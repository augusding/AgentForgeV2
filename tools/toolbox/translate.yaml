id: translate
label: 翻译
description: 多语言互译
icon: "🌐"
category: writing
sort: 4
fields:
  - key: target_lang
    label: 目标语言
    type: select
    options: [英文, 日文, 韩文, 法文, 德文, 西班牙文]
    default: 英文
  - key: content
    label: 翻译内容
    type: textarea
    placeholder: 粘贴要翻译的文字
    required: true
  - key: attachment
    label: 或上传文档
    type: file
prompt_template: |
  将以下内容翻译为{target_lang}，保留原文格式：
  {content}
