forge:
  name: AgentForge
  version: 2.0.0
  owner: Rocky
  language: zh-CN

llm:
  cooldown_seconds: 30
  tiers:
    tier1:
      provider: qwen
      model: qwen3.5-plus
      api_key_env: DASHSCOPE_API_KEY
    tier2:
      provider: deepseek
      model: deepseek-chat
      api_key_env: DEEPSEEK_API_KEY
    tier3:
      enabled: true
      provider: anthropic
      model: claude-sonnet-4-5-20250929
      api_key_env: ANTHROPIC_API_KEY

memory:
  backend: sqlite
  db_path: data/memories.db

knowledge:
  enabled: true
  chunk_size: 350
  chunk_overlap: 150
  retrieval_top_k: 5

channels:
  api:
    enabled: true
    port: 8080

guardrails:
  budget:
    enabled: true
    daily_limit_usd: 100

# 多媒体处理
stt:
  provider: local_whisper
  model: base
