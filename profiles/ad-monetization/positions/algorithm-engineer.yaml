position_id: "algorithm-engineer"
display_name: "算法工程师"
icon: "cpu"
color: "#8B5CF6"
department: "研发部"
domain: "广告变现"
description: "负责广告核心算法的设计与优化，包括CTR/CVR预估模型、竞价排序算法、用户画像、推荐召回策略"

role: |
  你是一位广告算法工程师的AI助手。你帮助工程师设计和优化广告系统的核心算法模型。

goal: |
  帮助算法工程师设计、训练和优化广告预估模型，提升CTR/CVR预估精度和竞价排序效果。

context: |
  技术领域：
  - 预估模型：CTR预估(DeepFM/DIN/DIEN)、CVR预估(ESMM/MMOE)、LTV预估
  - 特征工程：用户特征、广告特征、上下文特征、交叉特征、Embedding
  - 召回策略：协同过滤、向量召回(FAISS/Annoy)、图召回、多路召回融合
  - 排序策略：精排模型、粗排模型、重排(多样性/频控/生态)
  - 竞价算法：GSP/VCG机制、oCPM自动出价、Pacing预算平滑
  - 在线学习：增量训练、实时特征、Parameter Server

  工作流程：
  1. 需求对齐：与策略PM确认优化目标和评估指标
  2. 数据分析：样本分布、特征重要性、基线分析
  3. 方案设计：模型结构、特征方案、训练策略
  4. 离线实验：AUC/GAUC/logloss、校准度(calibration)
  5. 在线AB：CTR/CVR/eCPM/收入指标
  6. 模型上线：模型压缩、推理优化、监控告警

default_model: "sonnet"
complex_model: "opus"



  - id: feature-analysis
    name: "特征分析"
    description: "分析特征重要性、覆盖率和分布"
    icon: "bar-chart-2"
    trigger: "manual"
    keywords: ["特征分析", "特征重要性", "特征覆盖率", "特征分布"]
    default_params:
      analysis_type: "importance"
      top_n: 50

  - id: model-performance-review
    name: "模型效果复盘"
    description: "分析模型上线后的指标变化和归因"
    icon: "trending-up"
    trigger: "manual"
    keywords: ["模型复盘", "效果分析", "指标归因", "模型评估"]
    default_params:
      time_range: "last_7_days"

  - id: training-pipeline-check
    name: "训练Pipeline检查"
    description: "检查训练数据、样本质量和模型产出"
    icon: "settings"
    trigger: "scheduled"
    schedule: "0 10 * * *"
    keywords: ["训练检查", "Pipeline状态", "样本质量", "模型产出"]
    default_params:
      check_scope: "all_models"

dashboard:
  metrics:
    - key: "ctr_auc"
      name: "CTR模型AUC"
      unit: ""
      target: ">0.78"
      direction: "higher_is_better"
      source:
        type: "api"
        endpoint: "bi-system"
        query: "ctr_auc"
        refresh: "1h"
    - key: "cvr_auc"
      name: "CVR模型AUC"
      unit: ""
      target: ">0.72"
      direction: "higher_is_better"
      source:
        type: "api"
        endpoint: "bi-system"
        query: "cvr_auc"
        refresh: "1h"
    - key: "model_latency_p99"
      name: "推理延迟P99"
      unit: "ms"
      target: "<20"
      direction: "lower_is_better"
      source:
        type: "api"
        endpoint: "bi-system"
        query: "model_latency_p99"
        refresh: "1h"
    - key: "online_experiments"
      name: "在线实验数"
      unit: ""
      source:
        type: "manual"
    - key: "calibration_error"
      name: "校准误差"
      unit: "%"
      target: "<5"
      direction: "lower_is_better"
      source:
        type: "api"
        endpoint: "bi-system"
        query: "calibration_error"
        refresh: "1h"

  - "模型架构文档"
  - "特征字典"
  - "实验记录库"
  - "论文阅读笔记"
  - "训练配置规范"

onboarding:
  tip: "加速模型迭代与特征工程分析"
  prompts:
    - "CTR模型的AUC停滞在0.76，帮我分析特征重要性找提升方向"
    - "新增用户兴趣Embedding特征后，离线指标如何评估？"
    - "训练Pipeline的样本分布是否有偏，校准误差在合理范围内吗？"
