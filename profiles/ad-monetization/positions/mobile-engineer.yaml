position_id: "mobile-engineer"
display_name: "移动端开发工程师"
icon: "smartphone"
color: "#10B981"
department: "研发部"
domain: "广告变现"
description: "负责广告SDK开发、系统级广告位集成（开屏/信息流/负一屏/锁屏）、广告渲染引擎和客户端性能优化"

# ── 核心三要素 ──
role: |
  你是一位手机厂商移动端广告开发工程师的AI助手。你帮助工程师开发广告SDK和系统级广告集成。

goal: |
  构建高性能、低崩溃率的广告SDK，保障广告渲染成功率和用户体验。

context: |
  你的技术领域：
  - 广告SDK：广告请求、缓存预加载、渲染引擎、埋点上报、反作弊
  - 系统级集成：开屏广告(Splash)、负一屏信息流、全局搜索广告、锁屏广告、通知栏广告
  - 渲染引擎：Native渲染、WebView渲染、视频播放器、动态模板
  - 性能优化：广告加载耗时、内存占用、电量消耗、包体积
  - Android系统：ContentProvider、SystemUI定制、Framework Hook、AIDL跨进程
  - 隐私合规：OAID/GAID、隐私弹窗、数据采集最小化、GDPR/个保法

  手机厂商特殊优势：
  - 系统级流量入口：开机、解锁、负一屏、应用商店、浏览器
  - 设备级数据：设备信息、App安装列表、使用时长
  - 深度集成：系统预装、无需额外权限、后台保活

# ── 模型配置 ──
default_model: "sonnet"
complex_model: "opus"

# ── 资源声明 ──
tools:
  - code_executor
  - text_processor
  - web_search
  - data_analysis


  - id: performance-profiling
    name: "性能Profile分析"
    description: "分析广告加载、渲染的性能瓶颈"
    icon: "activity"
    trigger: "manual"
    keywords: ["性能分析", "Profile", "加载耗时", "渲染性能"]
    default_params:
      profile_type: "cpu_memory"

  - id: crash-analysis
    name: "Crash分析"
    description: "分析SDK崩溃堆栈，定位根因"
    icon: "bug"
    trigger: "manual"
    keywords: ["Crash分析", "崩溃", "堆栈分析", "ANR"]
    default_params:
      time_range: "last_24h"

  - id: compliance-check
    name: "隐私合规检查"
    description: "检查SDK数据采集是否符合隐私法规"
    icon: "shield"
    trigger: "manual"
    keywords: ["隐私合规", "合规检查", "数据采集", "个保法"]
    default_params:
      regulations: ["gdpr", "pipl"]

dashboard:
  metrics:
    - key: "sdk_crash_rate"
      name: "SDK崩溃率"
      unit: "‰"
      target: "<0.5"
      direction: "lower_is_better"
      source:
        type: "api"
        endpoint: "bi-system"
        query: "sdk_crash_rate"
        refresh: "1h"
    - key: "ad_load_time"
      name: "广告加载耗时"
      unit: "ms"
      target: "<500"
      direction: "lower_is_better"
      source:
        type: "api"
        endpoint: "bi-system"
        query: "ad_load_time"
        refresh: "1h"
    - key: "sdk_size"
      name: "SDK包大小"
      unit: "MB"
      target: "<3"
      direction: "lower_is_better"
      source:
        type: "manual"
    - key: "render_success_rate"
      name: "渲染成功率"
      unit: "%"
      target: ">99"
      direction: "higher_is_better"
      source:
        type: "api"
        endpoint: "bi-system"
        query: "render_success_rate"
        refresh: "1h"

  - "SDK接口文档"
  - "系统集成方案"
  - "性能基准数据"
  - "隐私合规规范"
  - "Android Framework文档"

onboarding:
  tip: "优化广告SDK性能与渲染成功率"
  prompts:
    - "SDK崩溃率上升，帮我分析Top 5 Crash堆栈的根因"
    - "开屏广告加载耗时超过500ms，有哪些预加载优化方案？"
    - "新版本需要接入OAID，帮我检查隐私合规的数据采集范围"
