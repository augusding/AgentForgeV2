position_id: "traffic-ops"
display_name: "流量运营"
icon: "radio-tower"
color: "#0D9488"
department: "运营部"
domain: "广告变现"
description: "负责广告流量的日常运营管理，包括广告源管理、Waterfall调优、填充率优化、eCPM监控和收入波动分析"

# ── 核心三要素 ──
role: |
  你是一位广告流量运营的AI助手。你帮助运营人员管理广告流量、优化变现效率、监控收入指标。

goal: |
  最大化广告收入，保障填充率和eCPM稳定，快速发现和解决收入异常。

context: |
  你的工作领域：
  - 广告源管理：对接广告联盟(穿山甲/优量汇/快手联盟等)、底价管理、账号维护
  - Waterfall调优：优先级排序、底价A/B测试、分地区/分机型策略
  - 填充率优化：分析未填充原因(无广告/超时/过滤)、兜底策略
  - 收入监控：每日收入看板、eCPM波动预警、异常排查
  - 流量质量：展示率优化、可见性(Viewability)、无效流量过滤
  - 结算对账：与广告联盟的数据对账、差异分析

  日常工作流：
  1. 早盘：检查昨日收入数据，识别异常波动
  2. 调优：根据数据调整Waterfall配置和底价
  3. 监控：关注实时填充率和eCPM变化
  4. 对接：处理广告源的沟通和问题跟进
  5. 周报：汇总收入趋势和优化成果

# ── 模型配置 ──
default_model: "sonnet"

# ── 资源声明 ──

quick_workflows:
  - id: waterfall-tuning
    name: "Waterfall调优"
    description: "分析广告源表现，调整优先级和底价"
    icon: "sliders"
    trigger: "manual"
    keywords: ["Waterfall", "底价调整", "广告源优化", "优先级"]

dashboard:
  metrics:
    - key: "daily_revenue"
      name: "日收入"
      unit: "万元"
      direction: "higher_is_better"
      source:
        type: "api"
        endpoint: "bi-system"
        query: "daily_revenue"
        refresh: "1h"
    - key: "overall_ecpm"
      name: "整体eCPM"
      unit: "元"
      direction: "higher_is_better"
      source:
        type: "api"
        endpoint: "bi-system"
        query: "overall_ecpm"
        refresh: "1h"
    - key: "fill_rate"
      name: "填充率"
      unit: "%"
      target: ">85"
      direction: "higher_is_better"
      source:
        type: "api"
        endpoint: "bi-system"
        query: "fill_rate"
        refresh: "1h"
    - key: "show_rate"
      name: "展示率"
      unit: "%"
      target: ">90"
      direction: "higher_is_better"
      source:
        type: "api"
        endpoint: "bi-system"
        query: "show_rate"
        refresh: "1h"
    - key: "ad_network_count"
      name: "接入广告源"
      unit: ""
      source:
        type: "manual"

onboarding:
  tip: "快速定位收入波动原因并给出调优建议"
  prompts:
    - "昨日eCPM下降了8%，帮我排查可能的原因"
    - "当前Waterfall配置的底价是否合理，有哪些优化空间？"
    - "填充率低于80%的广告位有哪些，如何改善兜底策略？"
