name: "report-prepare-and-insight"
description: "汇报准备与增量分析 + AI洞察：对比历史汇报生成增量稿，含问题诊断、趋势洞察、价值挖掘和质量评分"
version: "1.0"

trigger:
  keywords:
    - "汇报准备"
    - "增量分析"
    - "汇报优化"
    - "内容对比"
    - "洞察分析"
  semantic: "准备汇报材料，对比历史汇报进行增量分析和AI洞察"

parameters:
  - name: report_type
    type: select
    label: "汇报类型"
    required: true
    options: ["okr", "annual"]
    default: "okr"
  - name: period
    type: text
    label: "汇报周期"
    required: true
    default: "2025-Q4"
  - name: business_line
    type: text
    label: "业务线/职能线"
    required: true
  - name: report_content
    type: textarea
    label: "本期汇报素材（粘贴文字或提供文档链接）"
    required: true

nodes:
  # ── 第1步：收集并结构化本期汇报素材 ──
  - id: extract-current
    type: task
    instruction: |
      你是汇报内容分析专家。请从用户提供的汇报素材中提取以下结构化信息：

      汇报类型: {{ report_type }}
      汇报周期: {{ period }}
      业务线: {{ business_line }}

      汇报素材:
      {{ report_content }}

      请提取并结构化输出：
      1. 【核心指标】所有提到的量化指标及其数值（含目标值、实际值）
      2. 【重点工作】本期提及的所有工作事项，每项包含：名称、进展描述、量化结果（如有）
      3. 【问题与风险】提到的问题、挑战、风险
      4. 【下期计划】提到的下一步计划和TODO
      5. 【关键结论】汇报中的核心观点和判断

      以清晰的markdown格式输出，每个分类独立成段。
    output: current_report_extracted

  # ── 第2步：检索历史汇报生成对比基准 ──
  - id: retrieve-history
    type: task
    instruction: |
      请从知识库中检索该业务线（{{ business_line }}）同类型（{{ report_type }}）的近3期汇报记录。

      需要提取的历史信息：
      1. 上期汇报的核心指标和数值
      2. 上期汇报的重点工作事项列表
      3. 上期汇报提出的TODO和改进事项
      4. 上期汇报的关键结论

      如果知识库中没有历史汇报，请说明"无历史基准数据"，后续分析将基于本期材料独立进行。

      以markdown格式输出历史基准摘要。
    output: history_baseline

  # ── 第3步：增量对比分析 ──
  - id: delta-analysis
    type: task
    depends_on:
      - extract-current
      - retrieve-history
    instruction: |
      你是增量分析专家。请对比本期汇报和历史基准，进行增量分类：

      【本期汇报提取结果】
      {{ extract-current }}

      【历史基准】
      {{ retrieve-history }}

      请严格按以下分类输出增量分析：

      ## [NEW] 本期亮点（上期未出现的新内容）
      - 列出所有新增工作事项、新指标、新成果
      - 每项说明为什么是新增（上期无此内容）

      ## [CHANGED] 关键变化（同一事项/指标发生变化）
      - 列出数值变化的指标，附同比/环比数据
      - 列出状态变化的工作事项，说明前后对比
      - 变化幅度>15%的重点标注

      ## [DONE] 已收官（上期有本期无，已完成的工作）
      - 一句话总结每个收官项的最终成果

      ## [ONGOING] 持续推进（上期有本期也有，无显著变化）
      - 每项用1句话概括当前状态
      - 标注如果在正式汇报中，这些内容应该被压缩

      ## 冗余度统计
      - 延续项内容字数占总内容字数的比例
      - 冗余率 = 延续项字数 / 总字数
      - 如果冗余率 > 40%，给出具体的压缩建议
    output: delta_result

  # ── 第4步（并行A）：问题诊断 ──
  - id: problem-diagnosis
    type: task
    depends_on:
      - delta-analysis
    instruction: |
      你是资深业务分析师。请从以下汇报材料和增量分析结果中识别问题：

      【增量分析结果】
      {{ delta-analysis }}

      【本期汇报原始提取】
      {{ extract-current }}

      请从以下5个维度诊断问题：

      ### 1. 数据异常
      - 指标中是否有不合理的波动（>15%变化未解释）、下滑、异常值？
      - 数据是否完整，关键结论是否缺乏数据支撑？

      ### 2. 目标偏离
      - OKR/KPI完成度是否偏离预期？偏离幅度多大？
      - 偏离原因是否已充分说明？补救措施是否可行？

      ### 3. 逻辑缺陷
      - 论述中是否有因果不成立、归因不准确的地方？
      - 是否存在以偏概全、选择性展示数据的问题？

      ### 4. 风险盲区
      - 是否有明显风险未被提及（市场变化、竞争动态、资源瓶颈）？
      - 已识别的风险是否有应对方案？

      ### 5. 执行断层
      - 上期TODO中哪些未体现进展？是否有"说了没做"的情况？
      - 当前工作重点与既定目标是否对齐？

      对每个发现的问题，输出：
      | 问题描述 | 维度 | 严重度(高/中/低) | 改进建议 |
    output: problems

  # ── 第4步（并行B）：趋势洞察与价值挖掘 ──
  - id: insight-and-value
    type: task
    depends_on:
      - delta-analysis
    instruction: |
      你是业务洞察专家。基于汇报材料和增量分析结果，提供深度洞察：

      【增量分析结果】
      {{ delta-analysis }}

      【本期汇报原始提取】
      {{ extract-current }}

      请从以下维度提供洞察：

      ## 一、趋势分析
      - 哪些指标出现了拐点（由升转降或由降转升）？拐点意味着什么？
      - 连续多期的趋势线说明了什么？是否需要关注？
      - 有哪些"静默变化"（小幅但持续的趋势，容易被忽略）？

      ## 二、价值亮点（建议在汇报中重点突出）
      - 材料中哪些成果的价值被低估了？为什么值得重点讲？
      - 有哪些"做了但没讲好"的工作？建议如何重新表述以突出价值？
      - 给出3-5个建议的"汇报金句"（一句话概括核心成果的有冲击力表达）

      ## 三、创新建议
      - 基于当前业务现状和数据趋势，有哪些可探索的创新方向？
      - 是否有跨业务线协同的机会（基于对其他业务线汇报的了解）？
      - 有哪些行业最佳实践可以借鉴？

      每条建议给出：
      | 建议内容 | 预期价值 | 实施难度(高/中/低) | 优先级 |
    output: insights

  # ── 第4步（并行C）：质量评分 ──
  - id: quality-scoring
    type: task
    depends_on:
      - delta-analysis
    instruction: |
      你是汇报质量评审专家。请对这份汇报材料进行多维度质量评估。

      【增量分析结果】
      {{ delta-analysis }}

      【本期汇报原始提取】
      {{ extract-current }}

      评估标准参考知识库中的《汇报评分标准》。请按以下维度打分(1-10分)：

      | 维度 | 评分标准 | 得分 | 扣分原因 |
      |------|---------|------|---------|
      | 结构完整性(20%) | 是否覆盖所有必备板块 | X/10 | |
      | 数据支撑度(25%) | 关键结论是否有量化数据佐证 | X/10 | |
      | 增量信息量(25%) | 相比上期新增有效信息的占比 | X/10 | |
      | 行动明确性(15%) | 下一步计划是否有责任人、时间、目标 | X/10 | |
      | 表达精炼度(15%) | 是否简洁有力，无冗余废话 | X/10 | |

      **综合评分** = 加权平均（保留1位小数）

      **评级**: A(8.5-10) / B(7.0-8.4) / C(5.5-6.9) / D(<5.5)

      **TOP 5 优化建议**（按重要度排序）：
      1. [最重要的改进建议]
      2. ...
      3. ...
      4. ...
      5. ...
    output: quality_score

  # ── 第5步：汇总生成最终输出 ──
  - id: generate-final-report
    type: task
    depends_on:
      - delta-analysis
      - problem-diagnosis
      - insight-and-value
      - quality-scoring
    instruction: |
      你是汇报管理AI助手。请将所有分析结果汇总，生成最终的汇报辅助报告。

      【增量分析】
      {{ delta-analysis }}

      【问题诊断】
      {{ problem-diagnosis }}

      【趋势洞察与价值挖掘】
      {{ insight-and-value }}

      【质量评分】
      {{ quality_score }}

      请生成以下完整输出：

      ---
      # 汇报辅助报告
      **业务线**: {{ business_line }}
      **汇报类型**: {{ report_type }}
      **周期**: {{ period }}
      **生成时间**: [当前时间]

      ## 一、增量汇报稿（精简版）
      基于增量分析结果，重新组织汇报内容：
      - [NEW]标签的内容详细展开（占60%+篇幅）
      - [CHANGED]标签的内容附对比数据
      - [DONE]标签的内容一句话总结
      - [ONGOING]标签的内容合并为概览表格
      （直接输出可用于汇报的精简文稿）

      ## 二、洞察分析报告
      ### 问题清单（按严重度排序）
      （汇总问题诊断结果，标注严重度和建议）

      ### 价值亮点（建议重点讲的内容）
      （汇总价值挖掘结果，给出汇报建议）

      ### 创新建议
      （汇总创新方向和协同机会）

      ## 三、质量评分卡
      （直接引用质量评分结果）

      ## 四、优化行动清单
      将所有改进建议合并为一个优先级排序的TODO清单：
      | 序号 | 优化事项 | 类别 | 优先级 | 建议行动 |
      ---
    output: final_report

metadata:
  category: "汇报管理"
  author: "report-manager"
  tags:
    - "汇报"
    - "增量分析"
    - "AI洞察"
    - "质量评分"
